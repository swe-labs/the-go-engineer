# GitHub Automation Configuration (YAML Format)
# Example configuration for universal GitHub automation tool

owner: rasel9t6
repo: the-go-engineer

# ============================================================================
# LABELS CONFIGURATION
# ============================================================================
labels:
  # Issue Types
  - name: epic
    color: "3E1B6F"
    description: "Large feature spanning multiple issues or sections"
  
  - name: feature
    color: "0366D6"
    description: "New lesson, feature, or capability"
  
  - name: bug
    color: "D73A49"
    description: "Something is broken or not working as expected"
  
  - name: documentation
    color: "0075CA"
    description: "Improvements or additions to documentation"
  
  - name: refactor
    color: "CC00FF"
    description: "Code improvement without changing functionality"
  
  # Priority Levels
  - name: priority/critical
    color: "B60205"
    description: "Breaks existing functionality or blocks other work"
  
  - name: priority/high
    color: "FF6B6B"
    description: "Important for users/learners, needed soon"
  
  - name: priority/medium
    color: "FFA500"
    description: "Important but not urgent"
  
  - name: priority/low
    color: "FBCA04"
    description: "Nice to have, can wait"
  
  # Size/Effort
  - name: size/small
    color: "9BCD9B"
    description: "1-2 hours, 2 story points"
  
  - name: size/medium
    color: "FFD700"
    description: "2-4 hours, 3-5 story points"
  
  - name: size/large
    color: "FFA500"
    description: "4-8 hours, 8 story points"
  
  - name: size/xlarge
    color: "FF6347"
    description: "8+ hours, 13+ story points"
  
  # Status
  - name: status/backlog
    color: "FEF2C0"
    description: "Created but not yet in active sprint"
  
  - name: status/ready
    color: "C6E48B"
    description: "Refined, estimated, ready to work on"
  
  - name: status/in-progress
    color: "1E90FF"
    description: "Someone is actively working on it"
  
  - name: status/in-review
    color: "9370DB"
    description: "PR created, waiting for code review"
  
  - name: status/done
    color: "228B22"
    description: "Completed and merged"

# ============================================================================
# ISSUES CONFIGURATION
# ============================================================================
issues:
  - title: "[EPIC] Complete Project Implementation"
    body: |
      ## Overview
      Complete implementation with all features and documentation.
      
      ## Sub-Tasks
      - [ ] Task 1
      - [ ] Task 2
      - [ ] Task 3
      
      ## Success Criteria
      ✓ All tasks completed
      ✓ CI passes
      ✓ Documentation updated
    labels:
      - epic
      - priority/high
    assignees: []
  
  - title: "[DOCS] Update Documentation"
    body: |
      Update all documentation files.
      
      ## Tasks
      - [ ] README.md
      - [ ] ROADMAP.md
      - [ ] Section guides
      
      ## Acceptance Criteria
      ✓ No broken links
      ✓ All sections covered
    labels:
      - documentation
      - priority/high
      - size/medium
    assignees: []
  
  - title: "[FEATURE] Add New Feature"
    body: |
      Implement new feature.
      
      ## Requirements
      - Requirement 1
      - Requirement 2
      
      ## Testing
      - [ ] Unit tests
      - [ ] Integration tests
    labels:
      - feature
      - priority/high
      - size/large
    assignees: []

# ============================================================================
# DISCUSSIONS CONFIGURATION
# ============================================================================
# Note: Requires discussions to be enabled on the repo
discussions: []
  # - category_id: "DIC_kwDOxxxxxx"
  #   title: "Welcome to Discussions!"
  #   body: "Start discussing ideas, ask questions, and share knowledge."
