name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format Check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Module Tidy Check
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only)" ]; then
            echo "go.mod or go.sum needs updating. Run 'go mod tidy' locally."
            git diff
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Test with Race Detector
        run: go test -race ./...

      - name: Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Coverage Report
        run: |
          go test -coverprofile coverage.out ./...
          go tool cover -html coverage.out -o coverage.html
          COVERAGE=$(go tool cover -func coverage.out | grep total | awk '{print $3}')
          echo "## Code Coverage: $COVERAGE" >> $GITHUB_STEP_SUMMARY

      - name: Coverage Threshold Check
        run: |
          COVERAGE_PERCENT=$(go tool cover -func coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          awk -v cov="$COVERAGE_PERCENT" -v thresh="70.0" 'BEGIN { if (cov < thresh) { print "Coverage "cov"% is below threshold of "thresh"%"; exit 1 } else { print "Coverage "cov"% is above threshold of "thresh"%" } }'

      - name: Validate Curriculum
        run: go run ./scripts/validate_curriculum.go

      - name: Docker Build Validation
        run: docker build -f 11-flagship/01-opslane/Dockerfile .

      - name: Upload Coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.html

