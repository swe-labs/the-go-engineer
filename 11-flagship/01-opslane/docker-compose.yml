version: '3.8'

# Opslane local stack
# - PostgreSQL as the backing datastore
# - the flagship API container
# - health-gated startup ordering

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: capstone_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d capstone_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: 11-flagship/01-opslane/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://root:secretpassword@db:5432/capstone_db?sslmode=disable"
      OPSLANE_ENV: "development"
      OPSLANE_HTTP_ADDR: ":8080"
      OPSLANE_LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
